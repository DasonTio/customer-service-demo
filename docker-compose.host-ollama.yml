# Override for machines that run Ollama natively (e.g. macOS, where host
# Ollama gets Metal GPU acceleration). Start `ollama serve` on the host, then:
#
#   docker compose -f docker-compose.yml -f docker-compose.host-ollama.yml up -d
#
services:
  ollama:
    profiles: ["containerized-ollama"]

  ollama-init:
    profiles: ["containerized-ollama"]

  backend:
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/customer_service
      LLM_OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:3b}
    depends_on: !override
      db:
        condition: service_healthy
